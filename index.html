  <title>暖声 - AI 情绪陪伴树洞</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js?v=20260707"></script>
  <script>
    (function() {
      // 检测是否需要清除旧版缓存（URL 携带 ?v=N 时清除）
      if (location.search.includes('clear=1')) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.unregister() })
          })
        }
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(key) { caches.delete(key) })
          })
        }
        setTimeout(function() {
          var url = location.pathname + '?_=' + Date.now()
          if (location.search && !location.search.includes('clear=')) {
            url = location.pathname + location.search.replace('clear=1', '') + '&_=' + Date.now()
          }
          location.replace(url)
        }, 300)
      }
    })()
  </script>
</body>
</html>
